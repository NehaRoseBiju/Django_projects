{% extends 'forms.html' %}

{% block content %}

<h2>Instructor List</h2>

<br>

<a href="{% url 'instructor_create' %}">

Add Instructor

</a>

<table>

<tr>

<th>Name</th>

<th>Email</th>

<th>Department</th>

<th>Course</th>

<th>Update</th>

<th>Delete</th>

</tr>

{% for instructor in instructors %}

<tr>

<td>{{ instructor.name }}</td>

<td>{{ instructor.email }}</td>

<td>{{ instructor.department }}</td>

<td>{{ instructor.course }}</td>

<td>

<a href="{% url 'instructor_update' instructor.id %}">

Update

</a>

</td>

<td>

<a href="{% url 'instructor_delete' instructor.id %}">

Delete

</a>

</td>

</tr>

{% endfor %}

</table>

{% endblock %}
